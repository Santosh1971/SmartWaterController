<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SWC SoftAP Simulator</title>
<style>
  :root{ --bg:#12181a; --panel:#1a2226; --line:#263135; --amber:#e8a33d; --green:#4caf7d; --red:#d95b4a; --text:#d8e0e2; --muted:#7c8a8e; --mono:'SF Mono','Consolas',monospace; }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',sans-serif; padding:24px;}
  h1{font-size:15px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 20px;}
  h1 span{color:var(--amber);}
  .grid{display:grid; grid-template-columns: 300px 300px 1fr; gap:16px;}
  @media (max-width:940px){ .grid{grid-template-columns:1fr;} }
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:16px;}
  .panel h2{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin:0 0 14px;}
  .row{display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px;}
  .dot{width:10px; height:10px; border-radius:50%; background:#2a3538; flex-shrink:0;}
  .dot.on{background:var(--green); box-shadow:0 0 6px var(--green);}
  .stat{font-family:var(--mono); font-size:20px; margin-bottom:2px;}
  .stat-label{font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:12px;}
  button{background:#20292c; color:var(--text); border:1px solid var(--line); border-radius:4px; padding:7px 10px; font-size:12px; cursor:pointer; margin:0 6px 6px 0;}
  button:hover{border-color:var(--amber);}
  input[type=text],input[type=number]{background:#0e1416; border:1px solid var(--line); color:var(--text); padding:6px 8px; border-radius:4px; font-size:12px; width:100%; margin-bottom:6px;}
  input[type=range]{width:100%; margin:6px 0;}
  #log{font-family:var(--mono); font-size:11px; color:var(--muted); height:220px; overflow-y:auto; white-space:pre-wrap; line-height:1.5;}
</style>
</head>
<body>

<h1>SmartWaterController <span>· SoftAP Simulator</span></h1>

<div class="grid">

  <div class="panel">
    <h2>Device Status (device_info)</h2>
    <div class="row"><div class="dot" id="wifiDot"></div> WiFi connected: <b id="wifiVal">false</b></div>
    <div class="row"><div class="dot" id="mqttDot"></div> MQTT connected: <b id="mqttVal">false</b></div>
    <div class="row"><div class="dot" id="pumpDot"></div> Pump on: <b id="pumpVal">false</b></div>
    <div class="stat" id="litersVal">0.000 L</div>
    <div class="stat-label">Liters delivered (this cycle)</div>
    <div class="stat" id="rtcVal">--:--:--</div>
    <div class="stat-label">RTC time</div>
  </div>

  <div class="panel">
    <h2>Provisioning Commands</h2>
    <input type="text" id="ssid" placeholder="ssid">
    <input type="text" id="pass" placeholder="pass">
    <button onclick="wifiConfig()">POST /wifi_config</button>
    <hr style="border-color:var(--line); margin:12px 0;">
    <input type="text" id="broker" placeholder="broker" value="87.76.191.157">
    <input type="text" id="mqttUser" placeholder="user (optional)">
    <input type="text" id="mqttPass" placeholder="pass (optional)">
    <button onclick="mqttConfig()">POST /mqtt_config</button>
    <hr style="border-color:var(--line); margin:12px 0;">
    <button onclick="rtcSync()">POST /rtc_sync (now)</button>
    <button onclick="relayTest()">POST /relay_test</button>
    <button onclick="wifiScan()">GET /wifi_scan</button>
    <button onclick="factoryReset()">POST /factory_reset</button>
  </div>

  <div class="panel">
    <h2>Manual Sim Controls (dashboard-only)</h2>
    <div class="row">Flow rate: <span id="rateVal">0.0</span> L/min</div>
    <input type="range" id="flowSlider" min="0" max="10" step="0.5" value="0" oninput="onFlowSlider(this.value)">
    <button onclick="toggleRelay()">Toggle relay manually</button>
    <button onclick="resetTotals()">Reset totals</button>

    <h2 style="margin-top:18px;">Request Log</h2>
    <div id="log"></div>
  </div>

</div>

<script>
function log(line){
  const el = document.getElementById('log');
  el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${line}</div>`;
  el.scrollTop = el.scrollHeight;
}

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  if (msg.type === 'status') render(msg.data);
};

function render(s){
  document.getElementById('wifiDot').className = 'dot' + (s.wifi_connected ? ' on' : '');
  document.getElementById('wifiVal').textContent = s.wifi_connected;
  document.getElementById('mqttDot').className = 'dot' + (s.mqtt_connected ? ' on' : '');
  document.getElementById('mqttVal').textContent = s.mqtt_connected;
  document.getElementById('pumpDot').className = 'dot' + (s.pump_on ? ' on' : '');
  document.getElementById('pumpVal').textContent = s.pump_on;
  document.getElementById('litersVal').textContent = s.liters_delivered.toFixed(3) + ' L';
  document.getElementById('rtcVal').textContent = s.rtc_time;
}

async function post(path, body){
  log(`POST ${path} ${body ? JSON.stringify(body) : ''}`);
  const res = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  const json = await res.json();
  log(`  → ${JSON.stringify(json)}`);
  return json;
}
async function get(path){
  log(`GET ${path}`);
  const res = await fetch(path);
  const json = await res.json();
  log(`  → ${JSON.stringify(json)}`);
  return json;
}

function wifiConfig(){ post('/wifi_config', {ssid: document.getElementById('ssid').value, pass: document.getElementById('pass').value}); }
function mqttConfig(){ post('/mqtt_config', {broker: document.getElementById('broker').value, port:1883, user: document.getElementById('mqttUser').value, pass: document.getElementById('mqttPass').value}); }
function rtcSync(){ post('/rtc_sync', {unix: Math.floor(Date.now()/1000)}); }
function relayTest(){ post('/relay_test', {}); }
function wifiScan(){ get('/wifi_scan'); }
function factoryReset(){ post('/factory_reset', {}); }

let relayState = false;
function toggleRelay(){ relayState = !relayState; post('/sim/relay', {on: relayState}); }
function onFlowSlider(v){ document.getElementById('rateVal').textContent = parseFloat(v).toFixed(1); post('/sim/flow-rate', {literPerMin: parseFloat(v)}); }
function resetTotals(){ post('/sim/reset-totals', {}); }
</script>
</body>
</html>
