[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_MAX_PACKET_SIZE=1024
    -I include

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    ayushsharma82/ElegantOTA@^3.1
    adafruit/RTClib@^2.1
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
monitor_port = /dev/cu.usbserial-0001  ; optional, for Serial Monitor